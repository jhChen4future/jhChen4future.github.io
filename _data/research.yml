- number: "03"
  title: A Unified Architecture for Social Preferences Across Studies
  status: Ongoing project
  featured: true
  summary: >-
    This project asks whether social behavior across experimental settings is best
    explained by one common preference parameter, domain-specific differences, or a
    layered architecture that also captures dynamic states and focal choice processes.
    It uses public human-subject datasets and cross-study validation to test which
    components are genuinely transferable.
  themes:
    - Social preferences
    - Behavioral modeling
    - Cross-study validation
