- number: "01"
  title: A Unified Architecture for Social Preferences Across Studies
  status: Ongoing project
  featured: true
  summary: >-
    This project asks whether social behavior across experimental settings is best
    explained by one common preference parameter, domain-specific differences, or a
    layered architecture that also captures dynamic states and focal choice processes.
    It uses public human-subject datasets and cross-study validation to test which
    components are genuinely transferable.
  themes:
    - Social preferences
    - Behavioral modeling
    - Cross-study validation

- number: "02"
  title: "Strategic De-socialization: Experimental Evidence on Human Interaction with Large Language Models"
  featured: true
  summary: >-
    Laboratory experiments examine when people extend fairness, trust, and reciprocity
    to LLM counterparts. The results suggest that average differences are limited in
    low-enforcement settings, while strategic incentives can shift behavior away from
    reciprocal norms and toward exploitation of a predictably benevolent AI.
  detail_url: /research/strategic-desocialization/
  detail_label: See what I found
  themes:
    - Human-AI interaction
    - Social preferences
    - Experimental economics

- number: "03"
  title: Data-Driven Investment Strategies in Chinese Film Ticketing Platforms
  featured: true
  summary: >-
