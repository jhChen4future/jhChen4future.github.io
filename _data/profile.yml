intro: >-
  I am an undergraduate student in the School of Management at Zhejiang University,
  majoring in Accounting (Intelligent Financial Management). My research sits at the
  intersection of behavioral and experimental economics, social preferences, and
  human-AI interaction.

research_statement: >-
  I am interested in the small, often invisible forces that shape a decision: identity,
  social context, incentives, and the presence of intelligent systems. I use behavioral
  experiments and data-driven methods to make those forces visible.

interests:
  - Behavioral economics
  - Experimental economics
  - Social preferences
  - Human-AI interaction
  - Data-driven decision making
