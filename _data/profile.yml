intro: >-
  I recently graduated from the School of Management at Zhejiang University, where I
  studied Accounting (Intelligent Financial Management Class). I am an incoming M.S.
  student in Applied Economics and Management at Cornell University. My research
  interests are in behavioral and experimental economics, prosocial behavior, and the
  potential of large language models in social science.

research_statement: >-
  I study how people decide and cooperate in social settings, with a focus on social
  preferences, prosocial behavior, and the institutions and technologies that shape
  them. I am also interested in how large language models can expand the questions
  and methods of social science research.

interests:
  - Behavioral economics
  - Experimental economics
  - Prosocial behavior
  - Cooperation and social preferences
  - Human-AI interaction
  - Large language models in social science
