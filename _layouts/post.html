---
layout: default
---
<article class="prose-page shell narrow-shell">
  <header class="page-heading post-heading reveal">
    <a class="back-link" href="{{ '/writing/' | relative_url }}">&larr; All writing</a>
    <p class="eyebrow">Field note &middot; {{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="page-intro">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose reveal">
    {{ content }}
  </div>
</article>
