<header class="site-header" data-site-header>
  <div class="shell header-inner">
    <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} - home">
      <span class="wordmark-mark" aria-hidden="true">JC</span>
      <span class="wordmark-name">Jinghao Chen</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">
      <span>Menu</span><span class="nav-toggle-mark" aria-hidden="true"></span>
    </button>

    <nav class="site-nav" id="site-navigation" aria-label="Primary navigation">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}" {% if page.nav == item.key %}aria-current="page"{% endif %}>{{ item.label }}</a>
      {% endfor %}
      <a class="nav-contact" href="mailto:{{ site.data.profile.email }}">Let's talk <span aria-hidden="true">&nearr;</span></a>
      <button class="theme-toggle" type="button" aria-label="Switch color theme" title="Switch color theme">
        <span class="theme-toggle-sun" aria-hidden="true">&#9728;</span>
        <span class="theme-toggle-moon" aria-hidden="true">&#9680;</span>
      </button>
    </nav>
  </div>
</header>
